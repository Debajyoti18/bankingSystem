apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-frontend
  labels:
    app: banking-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-frontend
  template:
    metadata:
      labels:
        app: banking-frontend
    spec:
      containers:
        - name: frontend
          image: your-dockerhub-username/banking-system-frontend:latest
          ports:
            - containerPort: 5173
          env:
            - name: VITE_API_BASE
              value: /api
---
apiVersion: v1
kind: Service
metadata:
  name: banking-frontend-service
  labels:
    app: banking-frontend
spec:
  selector:
    app: banking-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5173
  type: LoadBalancer
