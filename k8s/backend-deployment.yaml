apiVersion: apps/v1
kind: Deployment
metadata:
  name: banking-backend
  labels:
    app: banking-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: banking-backend
  template:
    metadata:
      labels:
        app: banking-backend
    spec:
      containers:
        - name: backend
          image: your-dockerhub-username/banking-system-backend:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_DATASOURCE_URL
              value: jdbc:mysql://mysql:3306/banking_system_jwt
            - name: SPRING_DATASOURCE_USERNAME
              value: banking_user
            - name: SPRING_DATASOURCE_PASSWORD
              value: secure_password_123
            - name: JWT_SECRET
              value: mySecretKeyForJWTTokenGenerationThatShouldBeLongEnoughForSecurity
            - name: JWT_EXPIRATION
              value: "86400000"
---
apiVersion: v1
kind: Service
metadata:
  name: banking-backend-service
  labels:
    app: banking-backend
spec:
  selector:
    app: banking-backend
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
